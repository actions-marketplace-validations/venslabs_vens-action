name: vens
description: Prioritize vulnerabilities by real risk, not just CVSS
author: fahedouch
branding:
  icon: shield
  color: purple

inputs:
  version:
    description: "vens release tag to install (e.g. v0.3.1). Ignored when 'bin-path' is set. 'latest' is not yet supported."
    required: false
    default: ""
  bin-path:
    description: "Path to a pre-installed vens binary. When set, skips download and checksum verification. Useful for air-gapped environments and custom builds."
    required: false
    default: ""
  config-file:
    description: "Path to config.yaml describing project context"
    required: true
  input-report:
    description: "Path to the Trivy or Grype JSON scan report"
    required: true
  input-format:
    description: "Scanner format: auto | trivy | grype"
    required: false
    default: auto
  output-vex:
    description: "Output path for the generated CycloneDX VEX file"
    required: false
    default: vens-vex.cdx.json
  sbom-serial-number:
    description: "BOM-Link serial of the SBOM the scan report was produced from, in 'urn:uuid:<uuid>' form. Pin one UUID per service and reuse it across runs so VEX documents stay linkable."
    required: true
  sbom-version:
    description: "BOM-Link version integer"
    required: false
    default: "1"
  llm-provider:
    description: "LLM backend: openai | anthropic | googleai | ollama | mock"
    required: false
    default: openai
  llm-model:
    description: "Model name (mapped to <PROVIDER>_MODEL env var)"
    required: false
    default: ""
  llm-api-key:
    description: "API key for the selected provider. Masked in logs."
    required: false
    default: ""
  llm-base-url:
    description: "Custom base URL (OpenAI-compatible endpoints or Ollama host)"
    required: false
    default: ""
  llm-batch-size:
    description: "Number of CVEs per LLM request"
    required: false
    default: "10"
  enrich:
    description: "If true, also produce an enriched Trivy report"
    required: false
    default: "false"
  output-enriched-report:
    description: "Output path for the enriched Trivy report (when enrich=true)"
    required: false
    default: vens-enriched.json
  debug-dir:
    description: "If set, dump LLM prompts and responses to this directory"
    required: false
    default: ""
  working-directory:
    description: "Working directory for the run"
    required: false
    default: "."

outputs:
  vex-file:
    description: "Path to the generated CycloneDX VEX file"
    value: ${{ steps.run.outputs.vex-file }}
  enriched-report:
    description: "Path to the enriched Trivy report (empty when enrich=false)"
    value: ${{ steps.run.outputs.enriched-report }}
  version:
    description: "vens version that was installed"
    value: ${{ steps.install.outputs.version }}
  sbom-serial-number:
    description: "SBOM serial number that was used (useful when auto-generated)"
    value: ${{ steps.run.outputs.sbom-serial-number }}

runs:
  using: composite
  steps:
    - name: Mask secrets and guard platform
      shell: bash
      env:
        INPUT_LLM_API_KEY: ${{ inputs.llm-api-key }}
      run: |
        set -euo pipefail
        if [ -n "${INPUT_LLM_API_KEY}" ]; then
          echo "::add-mask::${INPUT_LLM_API_KEY}"
        fi
        case "${RUNNER_OS}" in
          Linux|macOS) ;;
          *)
            echo "::error::vens-action does not support ${RUNNER_OS} runners. Supported: Linux, macOS."
            exit 1
            ;;
        esac

    - name: Install vens
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_BIN_PATH: ${{ inputs.bin-path }}
      run: |
        set -euo pipefail

        if [ -n "${INPUT_BIN_PATH}" ]; then
          if [ ! -x "${INPUT_BIN_PATH}" ]; then
            echo "::error::bin-path does not exist or is not executable: ${INPUT_BIN_PATH}"
            exit 1
          fi
          bin_dir=$(cd "$(dirname "${INPUT_BIN_PATH}")" && pwd)
          echo "${bin_dir}" >> "${GITHUB_PATH}"
          resolved=$("${INPUT_BIN_PATH}" --version 2>&1 | awk '{for(i=1;i<=NF;i++) if ($i ~ /^v[0-9]/) {print $i; exit}}')
          echo "bin=${INPUT_BIN_PATH}" >> "${GITHUB_OUTPUT}"
          echo "version=${resolved:-unknown}" >> "${GITHUB_OUTPUT}"
          echo "Using pre-installed vens at ${INPUT_BIN_PATH} (version: ${resolved:-unknown})"
          exit 0
        fi

        if [ -z "${INPUT_VERSION}" ]; then
          echo "::error::One of 'version' or 'bin-path' must be set."
          exit 1
        fi

        case "${RUNNER_OS}" in
          Linux)  os=linux ;;
          macOS)  os=darwin ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)    arch=amd64 ;;
          ARM64)  arch=arm64 ;;
          *)
            echo "::error::Unsupported runner arch: ${RUNNER_ARCH}"
            exit 1
            ;;
        esac

        version="${INPUT_VERSION}"
        if [ "${version}" = "latest" ]; then
          echo "::error::'version: latest' is not yet supported. Pin a tag like v0.3.1."
          exit 1
        fi
        if ! printf '%s' "${version}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
          echo "::error::Invalid 'version' input: ${version}. Expected semver tag like v0.3.1."
          exit 1
        fi

        tarball="vens-${version}-${os}-${arch}.tar.gz"
        base_url="https://github.com/venslabs/vens/releases/download/${version}"
        install_dir="${RUNNER_TEMP}/vens-${version}"
        mkdir -p "${install_dir}"
        cd "${install_dir}"

        echo "Downloading ${tarball}"
        curl -fsSL --proto '=https' --tlsv1.2 -o "${tarball}" "${base_url}/${tarball}"
        curl -fsSL --proto '=https' --tlsv1.2 -o SHA256SUMS "${base_url}/SHA256SUMS"

        echo "Verifying checksum"
        grep -F "  ${tarball}" SHA256SUMS > "${tarball}.sha256"
        if [ ! -s "${tarball}.sha256" ]; then
          echo "::error::Could not find ${tarball} in SHA256SUMS"
          exit 1
        fi
        shasum -a 256 -c "${tarball}.sha256"

        tar -xzf "${tarball}"
        chmod +x ./vens

        echo "${install_dir}" >> "${GITHUB_PATH}"
        echo "bin=${install_dir}/vens" >> "${GITHUB_OUTPUT}"
        echo "version=${version}" >> "${GITHUB_OUTPUT}"
        ./vens --version

    - name: Run vens
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_REPORT: ${{ inputs.input-report }}
        INPUT_FORMAT: ${{ inputs.input-format }}
        INPUT_OUTPUT_VEX: ${{ inputs.output-vex }}
        INPUT_SBOM_SERIAL: ${{ inputs.sbom-serial-number }}
        INPUT_SBOM_VERSION: ${{ inputs.sbom-version }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm-provider }}
        INPUT_LLM_BATCH_SIZE: ${{ inputs.llm-batch-size }}
        INPUT_ENRICH: ${{ inputs.enrich }}
        INPUT_ENRICHED_OUT: ${{ inputs.output-enriched-report }}
        INPUT_DEBUG_DIR: ${{ inputs.debug-dir }}
        INPUT_LLM_API_KEY: ${{ inputs.llm-api-key }}
        INPUT_LLM_MODEL: ${{ inputs.llm-model }}
        INPUT_LLM_BASE_URL: ${{ inputs.llm-base-url }}
      run: |
        set -euo pipefail

        if [ -n "${INPUT_LLM_API_KEY}" ]; then
          echo "::add-mask::${INPUT_LLM_API_KEY}"
        fi

        case "${INPUT_LLM_PROVIDER}" in
          openai)
            export OPENAI_API_KEY="${INPUT_LLM_API_KEY}"
            export OPENAI_MODEL="${INPUT_LLM_MODEL}"
            export OPENAI_BASE_URL="${INPUT_LLM_BASE_URL}"
            ;;
          anthropic)
            export ANTHROPIC_API_KEY="${INPUT_LLM_API_KEY}"
            export ANTHROPIC_MODEL="${INPUT_LLM_MODEL}"
            ;;
          googleai)
            export GOOGLE_API_KEY="${INPUT_LLM_API_KEY}"
            export GOOGLE_MODEL="${INPUT_LLM_MODEL}"
            ;;
          ollama)
            export OLLAMA_MODEL="${INPUT_LLM_MODEL}"
            export OLLAMA_HOST="${INPUT_LLM_BASE_URL}"
            ;;
          mock)
            ;;
          *)
            echo "::error::Unknown llm-provider: ${INPUT_LLM_PROVIDER}. Expected openai|anthropic|googleai|ollama|mock."
            exit 1
            ;;
        esac

        serial="${INPUT_SBOM_SERIAL}"
        if [ -z "${serial}" ]; then
          echo "::error::sbom-serial-number is required. Pin a stable 'urn:uuid:<uuid>' per service — see https://cyclonedx.org/capabilities/bomlink/"
          exit 1
        fi
        if ! printf '%s' "${serial}" | grep -Eq '^urn:uuid:[0-9a-fA-F-]+$'; then
          echo "::error::sbom-serial-number must be of the form 'urn:uuid:<uuid>' (got: ${serial})"
          exit 1
        fi

        generate_args=(
          --config-file "${INPUT_CONFIG_FILE}"
          --llm "${INPUT_LLM_PROVIDER}"
          --llm-batch-size "${INPUT_LLM_BATCH_SIZE}"
          --input-format "${INPUT_FORMAT}"
          --sbom-serial-number "${serial}"
          --sbom-version "${INPUT_SBOM_VERSION}"
        )
        if [ -n "${INPUT_DEBUG_DIR}" ]; then
          generate_args+=(--debug-dir "${INPUT_DEBUG_DIR}")
        fi

        vens generate "${generate_args[@]}" "${INPUT_REPORT}" "${INPUT_OUTPUT_VEX}"

        echo "vex-file=${INPUT_OUTPUT_VEX}" >> "${GITHUB_OUTPUT}"
        echo "sbom-serial-number=${serial}" >> "${GITHUB_OUTPUT}"

        if [ "${INPUT_ENRICH}" = "true" ]; then
          vens enrich \
            --vex "${INPUT_OUTPUT_VEX}" \
            --output "${INPUT_ENRICHED_OUT}" \
            "${INPUT_REPORT}"
          echo "enriched-report=${INPUT_ENRICHED_OUT}" >> "${GITHUB_OUTPUT}"
        else
          echo "enriched-report=" >> "${GITHUB_OUTPUT}"
        fi
